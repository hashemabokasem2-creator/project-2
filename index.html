<!doctype html>
<html lang="en">
  <head>

    <title>building</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="

    <style>

        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-navbar-one: #f1e9e8;
        --bg-orange: #ff4000;
        --bg-light-orange: #e06822;
        --bg-light-secondary: #7c7673;
        --bg-dark-secondary: #47413f;
      }
      .background {
        background-color: var(--bg-navbar-one);
      }
    </style>

  <body>
    <!-- main -->
    <main>
      <div class="navbar bg-light">
        <div class="container-fluid background pt-2 pb-2">
          <div class="d-flex align-items-center gap-2">

          <div class="d-flex align-items-center gap-3">

            <a href="#" class="text-decoration-none text-dark"

            <a href="#" class="text-decoration-none text-dark"
              ><i class="fa-solid fa-mobile-screen-button"></i
            ></a>
          </div>
          <div class="btn btn-close"></div>
        </div>
      </div>
      <div class="navbar bg-light">
        <div class="container">
          <div>
            <a
              href="#"
              class="navbar-brand text-secondary fw-normal fs-3 text-lowercase"
            >
              logo
            </a>
          </div>
          <div class="d-flex align-items-center">
            <ul class="navbar nav">
              <li class="nav-item">
                <a href="#" class="nav-link">
                  <i class="fa-solid fa-bars text-dark"></i>
                </a>
              </li>
              <li class="nav-item">
                <a href="#" class="nav-link">
                  <i class="fa-brands fa-facebook-f text-dark"></i>
                </a>
              </li>
              <li class="nav-item">
                <a href="#" class="nav-link">
                  <i class="fa-brands fa-twitter text-dark"></i>
                </a>
              </li>
              <li class="nav-item">
                <a href="#" class="nav-link">
                  <i class="fa-brands fa-instagram text-dark"></i>
                </a>
              </li>
            </ul>
          </div>
        </div>

      <!-- section one -->
      <section
        class="py-5 text-white"
        style="
          background: url(&quot;img/Gemini_Generated_Image_nfdnb2nfdnb2nfdn.png&quot;);
        "
      >
        <div class="container">
          <div class="row align-items-center py-5">
            <div class="col-md-7 text-start">
              <h1
                class="display-3 fw-bold text-orange mb-3"
                style="color: #ff5722; font-family: sans-serif"
              >
                Building <br />

              <p
                class="text-white fst-italic mb-4"
                style="font-size: 1rem; max-width: 450px"

              <div class="input-group mb-4" style="max-width: 450px">
                <input
                  type="email"
                  class="form-control py-2"

                  style="border-radius: 0; border-color: #ccc"

                <button
                  class="btn text-white px-4 fw-bold"
                  type="button"
                  style="background-color: #ff5722; border-radius: 0"

                  SUBMIT

              <small class="text-white d-block mt-5" style="font-size: 0.8rem">
